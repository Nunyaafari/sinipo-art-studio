    <!-- Schema.org markup for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sinipo Art Studio",
      "url": "https://sinipo.art/",
      "description": "Premium art and fashion e-commerce website",
      "publisher": {
        "@type": "Organization",
        "name": "Sinipo Art Studio",
        "logo": "https://sinipo.art/logo.png"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://sinipo.art/shop?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sinipo Art Studio",
      "alternateName": "Sinipo Studio",
      "url": "https://sinipo.art/",
      "logo": "https://sinipo.art/logo.png",
      "description": "Premium art and fashion studio offering curated collections of contemporary artworks and designer fashion pieces.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG",
        "addressLocality": "Lagos"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+234-800-000-0000",
        "contactType": "customer service",
        "email": "hello@sinipo.art"
      },
      "sameAs": [
        "https://instagram.com/sinipo.art",

        "https://pinterest.com/sinipo.art"
      ],

    }

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        });
      }
    </script>
  </body>
</html>
